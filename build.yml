name: Flutter Build Engine

on:
  workflow_dispatch:  # ← Kunci! Bot panggil ini via API
    inputs:
      source_url:
        description: 'URL ZIP file dari GitHub Release'
        required: true
      tag:
        description: 'Unique tag for this build'
        required: true
      build_type:
        description: 'debug or release'
        required: true
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Download Source Code
        run: wget -O project.zip "${{ github.event.inputs.source_url }}"
      
      - name: Extract Project
        run: |
          unzip -q project.zip -d ./project
          cd ./project
          # Cari folder dengan pubspec.yaml (root project)
          export PROJECT_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          ls -la $PROJECT_DIR
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Install Dependencies
        run: |
          cd ${{ env.PROJECT_DIR }}
          flutter pub get
      
      - name: Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 3
